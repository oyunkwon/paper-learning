# Production stack for Coolify.
#
#   app       : the multistage image (API + built SPA) on port 8000
#   postgres  : data in a named volume, NOT exposed publicly
#
# Coolify's Traefik proxy routes the domain -> app:8000 over the internal
# network and terminates HTTPS; the app port is `expose`d (container-internal),
# not published to the host. In the Coolify UI set the domain and
# "Ports Exposes" = 8000. Secrets come from Coolify env, not git; see
# .env.example. R2 is external (via env); leave blank to run cache-only.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database (internal compose network; service name is the host).
      # Plain ${VAR} (no :? / :- defaults) — Coolify substitutes from its
      # Environment Variables UI and does NOT evaluate shell-style defaults.
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      RELAY_API_KEY: ${RELAY_API_KEY}
      RELAY_BASE_URL: ${RELAY_BASE_URL}
      LLM_MODEL: ${LLM_MODEL}
      CONTACT_EMAIL: ${CONTACT_EMAIL}
      # Cloudflare R2 (leave blank to run cache-only on the volume).
      R2_ENDPOINT_URL: ${R2_ENDPOINT_URL}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET: ${R2_BUCKET}
      R2_REGION: ${R2_REGION}
      # Auth: Google OAuth + signed session cookie. Set both Google vars in prod
      # (without them, login is disabled by design). AUTH_DEV_BYPASS is
      # force-disabled whenever GOOGLE_CLIENT_ID is set.
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      OAUTH_REDIRECT_URI: ${OAUTH_REDIRECT_URI}
      SESSION_SECRET: ${SESSION_SECRET}
      POST_LOGIN_REDIRECT: ${POST_LOGIN_REDIRECT}
      AUTH_DEV_BYPASS: ${AUTH_DEV_BYPASS}
      # Material binaries + retrieval cache live on a persistent volume.
      TUTOR_DATA_DIR: /data
    volumes:
      - appcache:/data
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/health').status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  appcache:
